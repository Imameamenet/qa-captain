<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>משוב על התהליך | אמא מאמנת</title>
<style>
  @font-face{font-family:'Sunday';src:url('https://imameamenet.co.il/wp-content/uploads/2026/05/Sunday-Light.woff2') format('woff2');font-weight:300;font-display:swap;}
  @font-face{font-family:'Sunday';src:url('https://imameamenet.co.il/wp-content/uploads/2026/05/Sunday-Extrabold.woff2') format('woff2');font-weight:800;font-display:swap;}
  *{box-sizing:border-box;}
  body{font-family:'Sunday',Heebo,Arial,sans-serif;background:#FAF8F2;color:#2D2D23;direction:rtl;margin:0;padding:28px 16px;line-height:1.6;}
  .wrap{max-width:640px;margin:0 auto;background:#fff;border-radius:14px;padding:26px 24px;box-shadow:0 2px 16px rgba(0,0,0,.06);}
  h1{font-weight:800;font-size:24px;margin:0 0 6px;}
  .sub{color:#6b6b5e;margin:0 0 22px;font-size:15px;}
  .q{margin:0 0 22px;}
  .q label.qt{display:block;font-weight:800;margin-bottom:10px;font-size:16px;}
  .opt{display:flex;align-items:center;gap:10px;margin:7px 0;cursor:pointer;font-weight:300;}
  .opt input{width:20px;height:20px;accent-color:#2D2D23;margin:0;flex:0 0 auto;}
  textarea{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:12px;font:inherit;direction:rtl;text-align:right;min-height:90px;}
  textarea:focus{border-color:#2D2D23;outline:none;}
  .scale{display:flex;gap:6px;flex-wrap:wrap;}
  .scale .opt{flex-direction:column;gap:4px;border:1.5px solid #ddd;border-radius:10px;padding:8px 12px;min-width:54px;text-align:center;}
  .scale .opt span{font-size:13px;color:#6b6b5e;}
  button{background:#E4E277;color:#2D2D23;border:none;border-radius:8px;padding:15px 34px;font-weight:800;font-size:17px;font-family:inherit;cursor:pointer;width:100%;margin-top:6px;}
  button:disabled{opacity:.6;}
  .done{display:none;text-align:center;padding:30px 10px;}
  .done h2{font-weight:800;}
  .err{color:#c0392b;font-size:14px;margin-top:8px;display:none;}
</style>
</head>
<body>
<div class="wrap">
  <form id="f">
    <h1>נשמח לשמוע איך היה התהליך 🌱</h1>
    <p class="sub">עברו כמה שבועות מתחילת הליווי, ואשמח לשמוע איך זה מרגיש לך. זה עוזר לנו להמשיך ולדייק.</p>

    <div class="q"><label class="qt">שביעות הרצון הכללית שלך מהתהליך</label>
      <div class="scale">
        <label class="opt"><input type="radio" name="q1" value="1" required>1<span>נמוכה</span></label>
        <label class="opt"><input type="radio" name="q1" value="2">2<span>&nbsp;</span></label>
        <label class="opt"><input type="radio" name="q1" value="3">3<span>&nbsp;</span></label>
        <label class="opt"><input type="radio" name="q1" value="4">4<span>&nbsp;</span></label>
        <label class="opt"><input type="radio" name="q1" value="5">5<span>גבוהה</span></label>
      </div>
    </div>

    <div class="q"><label class="qt">עד כמה המאמנת התאימה לך?</label>
      <div class="scale">
        <label class="opt"><input type="radio" name="q2" value="1" required>1<span>בכלל לא</span></label>
        <label class="opt"><input type="radio" name="q2" value="2">2<span>&nbsp;</span></label>
        <label class="opt"><input type="radio" name="q2" value="3">3<span>&nbsp;</span></label>
        <label class="opt"><input type="radio" name="q2" value="4">4<span>&nbsp;</span></label>
        <label class="opt"><input type="radio" name="q2" value="5">5<span>מאוד</span></label>
      </div>
    </div>

    <div class="q"><label class="qt">עד כמה המאמנת היתה זמינה וקשובה?</label>
      <div class="scale">
        <label class="opt"><input type="radio" name="q3" value="1" required>1<span>נמוכה</span></label>
        <label class="opt"><input type="radio" name="q3" value="2">2<span>&nbsp;</span></label>
        <label class="opt"><input type="radio" name="q3" value="3">3<span>&nbsp;</span></label>
        <label class="opt"><input type="radio" name="q3" value="4">4<span>&nbsp;</span></label>
        <label class="opt"><input type="radio" name="q3" value="5">5<span>גבוהה</span></label>
      </div>
    </div>

    <div class="q"><label class="qt">עד כמה קיבלת כלים מעשיים ליישום?</label>
      <div class="scale">
        <label class="opt"><input type="radio" name="q4" value="1" required>1<span>מעט</span></label>
        <label class="opt"><input type="radio" name="q4" value="2">2<span>&nbsp;</span></label>
        <label class="opt"><input type="radio" name="q4" value="3">3<span>&nbsp;</span></label>
        <label class="opt"><input type="radio" name="q4" value="4">4<span>&nbsp;</span></label>
        <label class="opt"><input type="radio" name="q4" value="5">5<span>הרבה</span></label>
      </div>
    </div>

    <div class="q"><label class="qt">עד כמה היית ממליצה על התהליך?</label>
      <div class="scale">
        <label class="opt"><input type="radio" name="q5" value="1" required>1<span>בכלל לא</span></label>
        <label class="opt"><input type="radio" name="q5" value="2">2<span>&nbsp;</span></label>
        <label class="opt"><input type="radio" name="q5" value="3">3<span>&nbsp;</span></label>
        <label class="opt"><input type="radio" name="q5" value="4">4<span>&nbsp;</span></label>
        <label class="opt"><input type="radio" name="q5" value="5">5<span>בהחלט</span></label>
      </div>
    </div>

    <div class="q"><label class="qt">מה יצאת מהשיחה / מהתהליך?</label>
      <textarea name="q6"></textarea>
    </div>

    <div class="q"><label class="qt">מה היית משפרת?</label>
      <textarea name="q7"></textarea>
    </div>

    <button type="submit" id="btn">שליחת המשוב</button>
    <div class="err" id="err">משהו השתבש. אפשר לנסות שוב בעוד רגע.</div>
  </form>
  <div class="done" id="done">
    <h2>תודה רבה 🌱</h2>
    <p>המשוב שלך התקבל. תודה שהקדשת מזמנך.</p>
  </div>
</div>
<script>
  var WEB_APP_URL = "https://hooks.zapier.com/hooks/catch/2269355/43a61gl/";
  var ref = new URLSearchParams(location.search).get('ref') || '';
  document.getElementById('f').addEventListener('submit', function(e){
    e.preventDefault();
    var btn=document.getElementById('btn'); btn.disabled=true; btn.textContent='שולח...';
    var fd=new FormData(e.target), a={};
    fd.forEach(function(v,k){a[k]=v;});
    fetch(WEB_APP_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({type:'feedback',track:'A',ref:ref,answers:a})})
      .then(function(){document.getElementById('f').style.display='none';document.getElementById('done').style.display='block';})
      .catch(function(){btn.disabled=false;btn.textContent='שליחת המשוב';document.getElementById('err').style.display='block';});
  });
</script>
</body>
</html>
